import { MessageCircle, FileText, ArrowRight, CheckCircle2, Star, Zap, ShieldCheck, Users, Award, Download, Smartphone, Phone } from "lucide-react";
import { useInstallEvent, triggerInstall } from "@/lib/pwa-install";
import hero1 from "@/assets/hero-van.jpg.asset.json";
import slide2 from "@/assets/slide-dish.jpg";
import slide3 from "@/assets/slide-decoder.jpg";
import { SERVICES } from "@/lib/services-data";
import { SITE, telLink, waLink } from "@/lib/site";

export const Route = createFileRoute("/")({
  head: () => ({
    meta: [
      { title: "Tshepo DStv & Electronic Solutions | Gauteng's Trusted Installers" },
      { name: "description", content: "Premium DStv installations, WiFi setup, phone unlocking and appliance repairs. Fast, professional, affordable — we come to you across Gauteng." },
      { property: "og:title", content: "Tshepo DStv & Electronic Solutions" },
      { property: "og:description", content: "Your Entertainment. Our Expertise. Premium installations across Gauteng." },
    ],
  }),
  component: HomePage,
